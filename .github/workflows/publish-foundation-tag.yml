name: Publish Foundation v0.1 tag

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-foundation-tag.yml

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create annotated Foundation tag
        run: |
          git config user.name "SP404 Toolkit CI"
          git config user.email "actions@users.noreply.github.com"
          git tag -a foundation-v0.1 1cd725afb9006bb497feb6e5e3297809183bebaf -m "SP404 Toolkit Foundation v0.1"
          git push origin refs/tags/foundation-v0.1
